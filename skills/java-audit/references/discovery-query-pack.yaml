language: Java-Audit-Discovery-Query-Pack
version: "3"
description: "Java Web 快速漏洞审计的系统化检索规则；脚本只执行检索，不判断漏洞成立。"

groups:
  - slug: "entrypoints-web"
    title: "入口/路由-Web"
    primary_family: "入口面"
    mapped_families: ["未授权访问", "鉴权绕过", "参数来源"]
    priority: "高"
    patterns:
      - "@RequestMapping|@GetMapping|@PostMapping|@PutMapping|@DeleteMapping|@PatchMapping"
      - "@Controller|@RestController|@ResponseBody|@Path\\(|@GET|@POST|@PUT|@DELETE"
      - "@WebServlet|HttpServlet|doGet|doPost|doPut|doDelete|service\\("
      - "RouterFunction|route\\(|HandlerFunction|ServerRequest|ServerResponse"

  - slug: "entrypoints-rpc"
    title: "入口/RPC/WebService"
    primary_family: "入口面"
    mapped_families: ["未授权访问", "鉴权绕过", "反序列化", "XXE"]
    priority: "高"
    patterns:
      - "@WebService|@WebMethod|Endpoint|ServiceEndpoint|CXF|JAX-WS|SOAPMessage"
      - "@Path\\(|ApplicationPath|ResourceConfig|Jersey|RESTEasy|Dropwizard"
      - "@DubboService|@DubboReference|@Reference|@Service\\(.*version|HessianServiceExporter|BurlapServiceExporter"
      - "@GrpcService|BindableService|StreamObserver|Thrift|TProcessor|RMI|UnicastRemoteObject"

  - slug: "entrypoints-async"
    title: "入口/消息/WebSocket/任务"
    primary_family: "入口面"
    mapped_families: ["未授权访问", "反序列化", "业务流程滥用"]
    priority: "中"
    patterns:
      - "@KafkaListener|@RabbitListener|@RocketMQMessageListener|@JmsListener|MessageListener"
      - "ObjectMessage|BytesMessage|TextMessage|onMessage\\(|consumeMessage|handleMessage"
      - "@ServerEndpoint|WebSocketHandler|TextWebSocketHandler|handleTextMessage|onMessage\\("
      - "@Scheduled|QuartzJobBean|JobExecutionContext|executeInternal|TimerTask"

  - slug: "user-input-http"
    title: "参数来源/HTTP"
    primary_family: "参数来源"
    mapped_families: ["SQL 注入", "命令注入", "文件读写", "SSRF", "XSS", "Mass Assignment"]
    priority: "高"
    patterns:
      - "getParameter|getParameterMap|getParameterValues|getHeader|getHeaders|getCookies|getInputStream|getReader"
      - "@RequestParam|@RequestBody|@PathVariable|@RequestHeader|@CookieValue|@ModelAttribute"
      - "HttpServletRequest|ServletRequest|ServerHttpRequest|ServerWebExchange|MultiValueMap"
      - "MultipartFile|Part|getParts|CommonsMultipartFile|MultipartHttpServletRequest"

  - slug: "user-input-structured"
    title: "参数来源/结构化数据"
    primary_family: "参数来源"
    mapped_families: ["反序列化", "Mass Assignment", "NoSQL/搜索注入", "XSS"]
    priority: "中"
    patterns:
      - "JSONObject|JSONArray|JSON\\.parse|JSON\\.parseObject|ObjectMapper|readValue|readTree"
      - "XmlMapper|XStream|Yaml|YAMLFactory|new Yaml|loadAs\\(|load\\("
      - "Map<String|HashMap|MultiValueMap|JsonNode|ObjectNode|ArrayNode"
      - "BindingResult|DataBinder|WebDataBinder|setAllowedFields|setDisallowedFields"

  - slug: "propagation-join-points"
    title: "传播中间态/拼接点"
    primary_family: "传播链线索"
    mapped_families: ["SQL 注入", "SSRF", "路径穿越", "越权", "Mass Assignment"]
    priority: "中"
    patterns:
      - "StringBuilder|StringBuffer|StringJoiner|String\\.format|MessageFormat\\.format|append\\("
      - "BeanUtils\\.copyProperties|PropertyUtils|ModelMapper|ConvertUtils|ReflectionUtils"
      - "orderBy|sortField|sortOrder|column|columns|tableName|where|filter|condition|keyword|query"
      - "fileName|filename|path|dir|url|uri|host|domain|callback|returnUrl|redirectUrl|tenantId|ownerId|userId|roleId"

  - slug: "auth-spring-shiro"
    title: "鉴权/授权-Spring/Shiro"
    primary_family: "鉴权面"
    mapped_families: ["未授权访问", "认证绕过", "水平/垂直越权", "CSRF/CORS"]
    priority: "高"
    patterns:
      - "SecurityFilterChain|WebSecurityConfigurerAdapter|authorizeHttpRequests|authorizeRequests|permitAll|web\\.ignoring"
      - "antMatchers|mvcMatchers|requestMatchers|hasRole|hasAnyRole|hasAuthority|access\\("
      - "@PreAuthorize|@PostAuthorize|@Secured|@RolesAllowed|PermissionEvaluator"
      - "ShiroFilterFactoryBean|DefaultWebSecurityManager|anon|authc|roles|perms|Subject|isAuthenticated|isPermitted"

  - slug: "auth-token-session"
    title: "鉴权/Token/Session/JWT"
    primary_family: "鉴权面"
    mapped_families: ["认证绕过", "弱密码学", "敏感信息泄露"]
    priority: "高"
    patterns:
      - "Jwts\\.parser|Jwts\\.builder|JWT\\.decode|JWT\\.require|Algorithm\\.none|NimbusJwtDecoder|JwtDecoder"
      - "Claims|getSubject|getClaim|Authorization|Bearer|refreshToken|accessToken|tokenSecret|signingKey"
      - "getSession|setAttribute|getAttribute|invalidate|rememberMe|setMaxInactiveInterval|SessionRegistry"
      - "SaRouter|StpUtil|SaToken|pac4j|Keycloak|OpenSAML|SAMLResponse|OAuth2|OIDC"

  - slug: "components-frameworks"
    title: "组件/框架"
    primary_family: "组件暴露面"
    mapped_families: ["反序列化", "表达式注入", "SQL 注入", "未授权访问", "敏感信息泄露"]
    priority: "中"
    patterns:
      - "fastjson|fastjson2|ObjectMapper|Jackson|XStream|SnakeYAML|Hessian|Kryo|FST"
      - "Shiro|Spring Security|Sa-Token|pac4j|Keycloak|Struts|OGNL|SpEL"
      - "MyBatis|MyBatis-Plus|Hibernate|JPA|JOOQ|QueryDSL|Druid|HikariCP"
      - "Actuator|Swagger|springfox|OpenAPI|Log4j|Jolokia|H2 Console|DWR|CXF|Axis"

  - slug: "sql-jdbc"
    title: "SQL/JDBC/Spring JDBC"
    primary_family: "SQL 注入"
    mapped_families: ["动态排序注入", "数据越权"]
    priority: "高"
    patterns:
      - "createStatement|prepareStatement|CallableStatement|executeQuery|executeUpdate|execute\\("
      - "JdbcTemplate|NamedParameterJdbcTemplate|SimpleJdbcInsert|queryForObject|queryForList|batchUpdate"
      - "select\\s+.*\\+|update\\s+.*\\+|insert\\s+.*\\+|delete\\s+.*\\+|where\\s+.*\\+"
      - "StringBuilder.*select|append\\(.*select|String\\.format\\(.*select|MessageFormat\\.format\\(.*select"

  - slug: "sql-mybatis"
    title: "SQL/MyBatis/MyBatis-Plus"
    primary_family: "SQL 注入"
    mapped_families: ["HQL/JPQL/JPA 注入", "动态排序注入", "数据越权"]
    priority: "高"
    patterns:
      - "\\$\\{|#\\{|<select|<update|<insert|<delete|<foreach|<where|<if\\b|<choose|<bind"
      - "@Select|@Update|@Insert|@Delete|@SelectProvider|@UpdateProvider|@InsertProvider|@DeleteProvider"
      - "QueryWrapper|LambdaQueryWrapper|UpdateWrapper|Wrappers\\.|SqlRunner|BaseMapper"
      - "\\.last\\s*\\(|\\.apply\\s*\\(|\\.exists\\s*\\(|\\.notExists\\s*\\(|\\.orderBy\\s*\\(|\\.orderByAsc\\s*\\(|\\.orderByDesc\\s*\\("
      - "orderBySql|inSql|notInSql|setSql|having|groupBy|tableName|column|sort"

  - slug: "sql-orm"
    title: "SQL/HQL/JPQL/JPA"
    primary_family: "HQL/JPQL/JPA 注入"
    mapped_families: ["SQL 注入", "动态排序注入", "数据越权"]
    priority: "高"
    patterns:
      - "createQuery|createNativeQuery|entityManager|Session\\.createQuery|Session\\.createSQLQuery"
      - "@Query|nativeQuery|Querydsl|JPAQueryFactory|CriteriaBuilder|Specification<"
      - "ORDER BY|GROUP BY|LIMIT|OFFSET|order by|group by|where .* like|where .* in"
      - "setParameter|setParameterList|Query\\.set|TypedQuery|NativeQuery"

  - slug: "nosql-search"
    title: "NoSQL/搜索"
    primary_family: "NoSQL/搜索注入"
    mapped_families: ["数据越权", "敏感信息泄露"]
    priority: "中"
    patterns:
      - "MongoTemplate|BasicDBObject|Document\\.parse|Criteria\\.where|Query\\.query|Aggregation"
      - "Elasticsearch|SearchRequest|SearchSourceBuilder|QueryBuilder|scriptQuery|matchQuery|termQuery|boolQuery"
      - "SolrQuery|setQuery|addFilterQuery|Jedis|Redisson|RedisTemplate|opsForValue|opsForHash"
      - "Neo4jClient|CassandraTemplate|CqlSession|InfluxDB|Prometheus"

  - slug: "command-exec"
    title: "命令/进程执行"
    primary_family: "命令注入"
    mapped_families: ["脚本注入", "RCE"]
    priority: "高"
    patterns:
      - "Runtime\\.getRuntime\\(\\)\\.exec|Runtime\\.exec|ProcessBuilder|ProcessImpl|start\\("
      - "/bin/sh|/bin/bash|cmd\\.exe|powershell|sh -c|bash -c|cmd /c"
      - "command|cmd|args|shell|exec\\(|executeCommand|runCommand"
      - "ffmpeg|convert|ImageMagick|wkhtmltopdf|phantomjs|tar |zip |unzip "

  - slug: "script-expression"
    title: "脚本/表达式执行"
    primary_family: "表达式注入"
    mapped_families: ["代码/脚本注入", "模板注入/SSTI", "RCE"]
    priority: "高"
    patterns:
      - "ScriptEngine|ScriptEngineManager|eval\\(|GroovyShell|GroovyClassLoader|Janino|AviatorEvaluator"
      - "MVEL|JEXL|ExpressionFactory|ExpressionParser|SpEL|parseExpression|StandardEvaluationContext"
      - "OGNL|getValue\\(|setValue\\(|Drools|KieSession|RuleEngine|Nashorn|Rhino"

  - slug: "template-view"
    title: "模板/视图输出"
    primary_family: "模板注入/SSTI"
    mapped_families: ["XSS", "表达式注入"]
    priority: "中"
    patterns:
      - "Freemarker|Velocity|Thymeleaf|Mustache|Pebble|Beetl|TemplateEngine|processTemplate|render"
      - "th:utext|utext|no_esc|escapeHtml|unescape|HtmlUtils|StringEscapeUtils"
      - "ModelAndView|addObject|addAttribute|setViewName|InternalResourceViewResolver"
      - "JSP|JstlView|out\\.print|c:out|escapeXml"

  - slug: "file-path-io"
    title: "文件/路径/IO"
    primary_family: "路径穿越"
    mapped_families: ["任意文件读写", "敏感信息泄露"]
    priority: "高"
    patterns:
      - "new File|Paths\\.get|Path\\.of|Files\\.read|Files\\.write|Files\\.copy|Files\\.move|Files\\.delete"
      - "FileInputStream|FileOutputStream|RandomAccessFile|FileReader|FileWriter|FileChannel"
      - "FileUtils|IOUtils|ResourceUtils|ClassPathResource|PathResource|UrlResource|ServletContext\\.getRealPath"
      - "getCanonicalPath|getAbsolutePath|normalize\\(|toRealPath|resolve\\(|relativize"

  - slug: "file-upload"
    title: "文件/上传/删除"
    primary_family: "文件上传危险类型"
    mapped_families: ["任意文件写/删除", "路径穿越", "敏感信息泄露"]
    priority: "高"
    patterns:
      - "MultipartFile|CommonsMultipartFile|MultipartResolver|MultipartConfigElement|Part\\.write"
      - "transferTo|getOriginalFilename|getContentType|getSize|upload|download|delete\\(|renameTo|copy|move"
      - "allowedExtensions|fileExt|suffix|contentType|mime|magic|thumbnail|ImageIO|PDFBox|POI"
      - "FileItem|DiskFileItemFactory|ServletFileUpload|isMultipartContent"

  - slug: "archive"
    title: "压缩/解压"
    primary_family: "Zip Slip/归档穿越"
    mapped_families: ["任意文件写/删除", "路径穿越"]
    priority: "高"
    patterns:
      - "ZipInputStream|ZipOutputStream|ZipEntry|JarEntry|JarFile|getNextEntry|entry\\.getName"
      - "TarArchiveInputStream|TarArchiveEntry|ArchiveInputStream|ArchiveEntry|SevenZFile|ZipFile"
      - "unzip|extract|decompress|expand|untar|unarchive|normalize\\(|getCanonicalPath"

  - slug: "ssrf-http-client"
    title: "SSRF/HTTP 客户端"
    primary_family: "SSRF"
    mapped_families: ["开放重定向/转发", "内网探测", "敏感信息泄露"]
    priority: "高"
    patterns:
      - "RestTemplate|WebClient|HttpClient|HttpClients|CloseableHttpClient|OkHttpClient|URLConnection|openConnection"
      - "FeignClient|Feign\\.builder|Retrofit|Jsoup\\.connect|AsyncHttpClient|Unirest|Fuel|JoddHttp"
      - "URL\\(|URI\\(|InetAddress|getByName|Socket\\(|ProxySelector|DnsResolver"
      - "callback|webhook|notifyUrl|callbackUrl|targetUrl|remoteUrl|imageUrl|avatarUrl"

  - slug: "redirect-forward"
    title: "跳转/转发/Header"
    primary_family: "开放重定向/转发"
    mapped_families: ["SSRF", "HTTP 响应拆分", "XSS"]
    priority: "中"
    patterns:
      - "sendRedirect|redirect:|forward:|RequestDispatcher|response\\.setHeader|response\\.addHeader"
      - "Location|returnUrl|redirectUrl|nextUrl|backUrl|goto|target|callback"
      - "setStatus\\(30|HttpStatus\\.FOUND|HttpStatus\\.MOVED|ResponseEntity\\.status"

  - slug: "cloud-storage-network"
    title: "云存储/外部存储/网络文件"
    primary_family: "SSRF"
    mapped_families: ["凭据泄露", "路径穿越", "敏感信息泄露"]
    priority: "中"
    patterns:
      - "AmazonS3|S3Client|S3Object|MinioClient|OSSClient|ObsClient|CosClient|BlobClient"
      - "FTPClient|SFTP|ChannelSftp|JSch|SmbFile|jcifs|NtlmPasswordAuthentication"
      - "putObject|getObject|presigned|preSigned|bucket|objectKey|endpoint|endpointUrl"

  - slug: "xml-xxe"
    title: "XML/XXE/XPath/XSLT"
    primary_family: "XXE"
    mapped_families: ["XPath 注入", "XSLT 注入", "SSRF", "文件读取"]
    priority: "高"
    patterns:
      - "DocumentBuilderFactory|SAXParserFactory|XMLInputFactory|SAXReader|SAXBuilder|JDOM|dom4j"
      - "JAXBContext|Unmarshaller|Marshaller|XMLReader|SAXSource|StreamSource|InputSource"
      - "TransformerFactory|Transformer|Templates|URIResolver|XPathFactory|XPath\\.evaluate|SchemaFactory"
      - "DOCTYPE|ENTITY|external-general-entities|external-parameter-entities|ACCESS_EXTERNAL_DTD|ACCESS_EXTERNAL_SCHEMA"

  - slug: "ldap-directory"
    title: "LDAP/目录查询"
    primary_family: "LDAP 注入"
    mapped_families: ["认证绕过", "敏感信息泄露"]
    priority: "高"
    patterns:
      - "DirContext|InitialDirContext|LdapContext|LdapTemplate|SearchControls|NamingEnumeration"
      - "ldap://|ldaps://|distinguishedName|userDn|baseDn|filter\\s*=|\\(uid=|\\(cn="
      - "DirContext\\.search|ldapTemplate\\.search|authenticate\\(|bind\\(|lookup\\("

  - slug: "deserialization-java"
    title: "反序列化/Java 原生与传输"
    primary_family: "反序列化"
    mapped_families: ["JNDI/远程查找", "RCE"]
    priority: "高"
    patterns:
      - "ObjectInputStream|readObject|readUnshared|resolveClass|ObjectMessage|getObject\\("
      - "XMLDecoder|Hessian|Burlap|Kryo|FST|Protostuff|SerializationUtils\\.deserialize"
      - "RMI|UnicastRemoteObject|Registry\\.lookup|Naming\\.lookup|MarshalledObject"

  - slug: "deserialization-json-yaml"
    title: "反序列化/JSON/YAML 多态"
    primary_family: "反序列化"
    mapped_families: ["JNDI/远程查找", "代码/脚本注入", "RCE"]
    priority: "高"
    patterns:
      - "fastjson|JSON\\.parseObject|parseArray|ParserConfig|autoType|SupportAutoType|JSONReader\\.Feature"
      - "ObjectMapper|enableDefaultTyping|activateDefaultTyping|@JsonTypeInfo|DefaultTyping|PolymorphicTypeValidator"
      - "XStream|fromXML|allowTypes|SnakeYAML|new Yaml|Constructor\\(|TypeDescription"
      - "InitialContext|JNDI|lookup\\(|ldap://|rmi://|iiop://"

  - slug: "xss-response"
    title: "XSS/响应输出"
    primary_family: "XSS"
    mapped_families: ["HTTP 响应拆分", "敏感信息泄露"]
    priority: "中"
    patterns:
      - "getWriter|print\\(|write\\(|ResponseEntity|StreamingResponseBody|text/html|application/javascript"
      - "ModelAndView|addAttribute|addObject|out\\.print|innerHTML|document\\.write"
      - "StringEscapeUtils\\.unescape|HtmlUtils\\.htmlUnescape|escapeXml\\s*=\\s*\\\"false\\\""

  - slug: "mass-assignment"
    title: "Mass Assignment/属性越权"
    primary_family: "Mass Assignment"
    mapped_families: ["水平/垂直越权", "金额/状态篡改", "租户越权"]
    priority: "中"
    patterns:
      - "BeanUtils\\.copyProperties|PropertyUtils|ModelMapper|DozerBeanMapper|BeanCopier"
      - "@RequestBody|@ModelAttribute|Map<String|JSONObject|JsonNode|updateById|saveOrUpdate|merge\\(|save\\("
      - "role|admin|isAdmin|status|price|amount|balance|userId|tenantId|ownerId|orgId|permission"

  - slug: "secrets-config"
    title: "凭据/敏感配置"
    primary_family: "硬编码凭据/密钥"
    mapped_families: ["敏感信息泄露", "横向访问风险"]
    priority: "高"
    patterns:
      - "password|passwd|pwd|secret|token|accessKey|secretKey|privateKey|BEGIN RSA|BEGIN PRIVATE KEY"
      - "jdbc:|redis:|mongodb:|mysql:|postgresql:|oracle:|ftp|smtp|credential|apikey|api_key"
      - "AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|xox[baprs]-|-----BEGIN"

  - slug: "crypto-random"
    title: "密码学/随机数/Token"
    primary_family: "弱密码学"
    mapped_families: ["Token 可预测", "认证绕过辅助链"]
    priority: "中"
    patterns:
      - "MD5|SHA1|SHA-1|DES|3DES|RC4|AES/ECB|NoPadding|MessageDigest|getInstance\\(\\\"MD5|getInstance\\(\\\"SHA1"
      - "Random\\(|Math\\.random|RandomStringUtils|UUID\\.randomUUID|SecureRandom"
      - "Cipher\\.getInstance|Mac\\.getInstance|KeyGenerator|PBEKeySpec|static final .*KEY|static final .*IV"

  - slug: "tls-trust"
    title: "TLS/证书信任"
    primary_family: "TLS 信任错误"
    mapped_families: ["SSRF", "敏感信息泄露"]
    priority: "高"
    patterns:
      - "TrustManager|X509TrustManager|HostnameVerifier|ALLOW_ALL|NoopHostnameVerifier|TrustAll"
      - "checkServerTrusted|verify\\(.*SSLSession|setHostnameVerifier|SSLContext\\.getInstance"
      - "disableCertificateValidation|ignoreSsl|trustAllCerts|setDefaultHostnameVerifier"

  - slug: "cors-csrf-cookie"
    title: "CORS/CSRF/Cookie"
    primary_family: "CORS/CSRF 配置缺陷"
    mapped_families: ["Cookie 安全属性缺失", "认证绕过辅助链"]
    priority: "中"
    patterns:
      - "@CrossOrigin|CorsConfiguration|allowedOrigins|allowedOriginPatterns|allowCredentials|CorsFilter"
      - "csrf\\.disable|CsrfFilter|csrfTokenRepository|SameSite|HttpOnly|Secure|setCookie|addCookie"
      - "Origin|Referer|X-Requested-With|CookieSerializer|DefaultCookieSerializer"

  - slug: "debug-admin-endpoints"
    title: "管理/调试端点"
    primary_family: "Actuator/调试接口暴露"
    mapped_families: ["未授权访问", "敏感信息泄露"]
    priority: "高"
    patterns:
      - "actuator|management\\.endpoints|heapdump|threaddump|env|configprops|prometheus|metrics"
      - "swagger|springfox|OpenAPI|api-docs|v2/api-docs|v3/api-docs|debug|trace"
      - "Jolokia|JMX|DruidStatView|StatViewServlet|H2 Console|Arthas|Dubbo Admin"

  - slug: "logging-audit"
    title: "日志/审计"
    primary_family: "日志注入"
    mapped_families: ["审计污染", "敏感信息泄露"]
    priority: "低"
    patterns:
      - "logger\\.|log\\.|audit|access log|login failed|userAgent|remoteAddr|X-Forwarded-For"
      - "printStackTrace|e\\.getMessage|getStackTrace|StackTraceElement|Throwable"
      - "CRLF|\\\\r|\\\\n|replaceAll\\(.*\\\\n|MDC\\.put|ThreadContext\\.put"

  - slug: "resource-redos"
    title: "ReDoS/资源消耗"
    primary_family: "ReDoS/资源消耗"
    mapped_families: ["批量导出", "业务滥用"]
    priority: "中"
    patterns:
      - "Pattern\\.compile|matches\\(|replaceAll|split\\(|Matcher\\.find|Matcher\\.matches"
      - "while\\(true\\)|recursive|Thread\\.sleep|CountDownLatch|parallelStream|CompletableFuture"
      - "pageSize|limit|batch|export|downloadAll|ZipInputStream|BigDecimal|parse|readAllBytes"

  - slug: "business-sensitive-flow"
    title: "业务安全关键词"
    primary_family: "业务流程滥用"
    mapped_families: ["越权", "回调伪造", "金额篡改", "验证码绕过"]
    priority: "中"
    patterns:
      - "resetPassword|changePassword|forgotPassword|verifyCode|captcha|smsCode|emailCode|otp"
      - "pay|refund|withdraw|transfer|balance|amount|price|discount|coupon|invoice"
      - "approve|audit|role|permission|tenant|org|owner|callback|notify|webhook|order|status"
